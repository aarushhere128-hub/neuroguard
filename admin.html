<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroGuard Admin Portal</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <h1>🩺 NeuroGuard Admin Portal</h1>

<div id="dashboard">

    <div class="card" id='totalCard'>
        <h2 id="totalAssessments">0</h2>
        <p>Total Assessments</p>
    </div>

    <div class="card" id='highCard'>
        <h2 id="highRisk">0</h2>
        <p>High Risk</p>
    </div>

    <div class="card" id='moderateCard'>
        <h2 id="moderateRisk">0</h2>
        <p>Moderate Risk</p>
    </div>

    <div class="card" id='lowCard'>
        <h2 id="lowRisk">0</h2>
        <p>Low Risk</p>
    </div>
    <div class="card" id="usersCard">
    <h2 id="totalUsers">0</h2>
    <p>Registered Users</p>
    </div>

</div>
    <div class="admin-tabs">

    <button id="assessmentTab" class="tab-btn active">
        📋 Assessments
    </button>

    <button id="usersTab" class="tab-btn">
        👥 Users
    </button>

    </div>
    
<div class="search-container">

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search by patient name or email...">

</div>
    <div id="assessmentSection">
<h2>Patient Assessments</h2>

    <table border="1" cellpadding="10" cellspacing="0" id="assessmentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Face</th>
                <th>Arm</th>
                          <th>Overall</th>
                <th>Risk</th>
                <th>Date</th>
                <th></th>
            </tr>
        </thead>

        <tbody id="tableBody">
            <!-- Rows will appear here -->
        </tbody>
    </table>
    </div>
    <div id="usersSection">
<h2>Registered Users</h2>

<table border="1" cellpadding="10" cellspacing="0">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Gender</th>
        </tr>
    </thead>

    <tbody id="usersBody"></tbody>
</table>
    </div>
    <script type="module" src="js/admin.js"></script>

</body>
</html>
