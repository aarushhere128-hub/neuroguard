<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroGuard Admin Portal</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <h1>🩺 NeuroGuard Admin Portal</h1>

<div id="dashboard">

    <div class="card">
        <h2 id="totalAssessments">0</h2>
        <p>Total Assessments</p>
    </div>

    <div class="card">
        <h2 id="highRisk">0</h2>
        <p>High Risk</p>
    </div>

    <div class="card">
        <h2 id="moderateRisk">0</h2>
        <p>Moderate Risk</p>
    </div>

    <div class="card">
        <h2 id="lowRisk">0</h2>
        <p>Low Risk</p>
    </div>

</div>

<h2>Patient Assessments</h2>

    <table border="1" cellpadding="10" cellspacing="0" id="assessmentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Face</th>
                <th>Arm</th>
                <th>Speech</th>
                <th>Overall</th>
                <th>Risk</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="tableBody">
            <!-- Rows will appear here -->
        </tbody>
    </table>

    <script type="module" src="js/admin.js"></script>

</body>
</html>
